name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # === UPDATED EMAIL NOTIFICATION STEP ===
      - name: Send Email Notification
        if: always() # 🔥 This forces the email to send on Success OR Failure
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          # 💡 Dynamically changes the subject line to show [success] or [failure]
          subject: "${{ job.status == 'success' && '✅' || '❌' }} Playwright Test Result: ${{ job.status }} (${{ github.repository }})"
          to: rangarajanragavan@gmail.com
          from: GitHub Actions Auditor <rangarajanragavan@gmail.com>
          body: |
            Playwright tests completed with status: "${{ job.status }}".

            Branch: "${{ github.ref_name }}"
            Commit: "${{ github.event.head_commit.message }}"

            You can view the run execution history and download reports here:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
