name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        if: always()
        run: npx playwright test
        env:
          PLAYWRIGHT_JSON_REPORT: playwright-report/results.json

      - name: Parse Test Results
        if: always()
        id: parse_results
        run: |
          if [ -f playwright-report/results.json ]; then
            PASSED=$(node -p "require('./playwright-report/results.json').stats.expected || 0")
            FAILED=$(node -p "require('./playwright-report/results.json').stats.unexpected || 0")
            SKIPPED=$(node -p "require('./playwright-report/results.json').stats.skipped || 0")
            
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          else
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "skipped=0" >> $GITHUB_OUTPUT
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Create github-pages directory
        if: always()
        run: |
          mkdir -p github-pages
          cp -r playwright-report/* github-pages/ || true
          if [ ! -f github-pages/index.html ]; then
            echo "<html><body><h1>Playwright Test Reports</h1><p>No reports available yet. Awaiting first test run.</p></body></html>" > github-pages/index.html
          fi

      - name: Send Email Notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "${{ job.status == 'success' && '✅' || '❌' }} Playwright Test Result: ${{ job.status }} (${{ github.repository }})"
          to: rangarajanragavan@gmail.com
          from: GitHub Actions Auditor <rangarajanragavan@gmail.com>
          html_body: |
            <!DOCTYPE html>
            <html>
            <head>
              <style>
                body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
                .summary-table { border-collapse: collapse; width: 100%; max-width: 400px; margin: 15px 0; }
                .summary-table th, .summary-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
                .summary-table th { background-color: #f2f2f2; }
                .pass { color: #28a745; font-weight: bold; }
                .fail { color: #dc3545; font-weight: bold; }
                .skip { color: #6c757d; font-weight: bold; }
                .btn { display: inline-block; padding: 10px 15px; background-color: #007bff; color: white; text-decoration: none; border-radius: 4px; margin-top: 15px; }
              </style>
            </head>
            <body>
              <h2>Playwright Test Execution Summary</h2>
              <p><strong>Status:</strong> ${{ job.status == 'success' && '🟢 Passed' || '🔴 Failed' }}</p>
              <p><strong>Branch:</strong> ${{ github.ref_name }}</p>
              <p><strong>Commit:</strong> ${{ github.event.head_commit.message }}</p>

              <table class="summary-table">
                <thead>
                  <tr>
                    <th>Metric</th>
                    <th>Count</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>Passed Tests</td>
                    <td class="pass">${{ steps.parse_results.outputs.passed }}</td>
                  </tr>
                  <tr>
                    <td>Failed Tests</td>
                    <td class="fail">${{ steps.parse_results.outputs.failed }}</td>
                  </tr>
                  <tr>
                    <td>Skipped Tests</td>
                    <td class="skip">${{ steps.parse_results.outputs.skipped }}</td>
                  </tr>
                </tbody>
              </table>

              <p>To view the detailed history and download the full artifact reports, visit the run page:</p>
              <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" class="btn" style="color: white;">View Workflow Run</a>
            </body>
            </html>

      # ========== Deploy to GitHub Pages ==========
      - name: 🌐 Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: github-pages
          keep_files: true

      # ========== Print Report URLs ==========
      - name: 🔗 Report URLs
        if: always()
        run: |
          echo "============================================"
          echo "📊 PLAYWRIGHT REPORTS PUBLISHED!"
          echo "============================================"
          echo ""
          echo "🏠 GitHub Pages URL:"
          echo "   https://rangarajan1989.github.io/POMPlaywrightPractice/"
          echo ""
          echo "📋 Test Report:"
          echo "   https://rangarajan1989.github.io/POMPlaywrightPractice/index.html"
          echo ""
          echo "📝 Results JSON:"
          echo "   https://rangarajan1989.github.io/POMPlaywrightPractice/results.json"
          echo ""
          echo "============================================"
