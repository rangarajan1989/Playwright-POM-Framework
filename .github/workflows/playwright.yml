name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Allure Reporter
        run: npm install --save-dev allure-playwright

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        if: always()
        run: npx playwright test login.spec.ts -g "Login to portal" --reporter=html,json,allure-playwright
        env:
          PLAYWRIGHT_JSON_REPORT: playwright-report/results.json

      - name: Parse Test Results
        if: always()
        id: parse_results
        run: |
          if [ -f playwright-report/results.json ]; then
            PASSED=$(node -p "require('./playwright-report/results.json').stats.expected || 0")
            FAILED=$(node -p "require('./playwright-report/results.json').stats.unexpected || 0")
            SKIPPED=$(node -p "require('./playwright-report/results.json').stats.skipped || 0")
          else
            PASSED=0
            FAILED=0
            SKIPPED=0
          fi

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT

          echo "Test Results:"
          echo "  Passed: $PASSED"
          echo "  Failed: $FAILED"
          echo "  Skipped: $SKIPPED"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Create github-pages directory
        if: always()
        run: |
          mkdir -p github-pages
          mkdir -p github-pages/playwright
          mkdir -p github-pages/allure

          # Copy Playwright reports
          if [ -d "playwright-report" ]; then
            cp -r playwright-report/* github-pages/playwright/ 2>/dev/null || true
          fi

          # Create main index.html with links
          cat > github-pages/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Test Reports</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 40px; }
              .report-link { display: inline-block; margin: 10px; padding: 15px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; }
              .report-link:hover { background: #0056b3; }
            </style>
          </head>
          <body>
            <h1>📊 Test Reports</h1>
            <a href="playwright/" class="report-link">📋 Playwright Report</a>
            <a href="allure/" class="report-link">📊 Allure Report</a>
          </body>
          </html>
          EOF

      - name: Install Allure
        if: always()
        run: |
          npm install -g allure-commandline

      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            npx allure generate allure-results -o github-pages/allure --clean
          else
            echo "No allure results found, creating placeholder..."
            mkdir -p github-pages/allure
            cat > github-pages/allure/index.html << 'EOFHTML'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Allure Report</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 40px; text-align: center; }
              h1 { color: #333; }
            </style>
          </head>
          <body>
            <h1>📊 Allure Report</h1>
            <p>Allure report will be available after the first test run with results.</p>
          </body>
          </html>
          EOFHTML
          fi

      - name: Send Email Notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "${{ job.status == 'success' && '✅' || '❌' }} Playwright Test Result: ${{ job.status }} (${{ github.repository }})"
          to: rangarajanragavan@gmail.com
          from: GitHub Actions Auditor <rangarajanragavan@gmail.com>
          html_body: |
            <!DOCTYPE html>
            <html>
            <head>
              <style>
                body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
                .summary-table { border-collapse: collapse; width: 100%; max-width: 400px; margin: 15px 0; }
                .summary-table th, .summary-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
                .summary-table th { background-color: #f2f2f2; }
                .pass { color: #28a745; font-weight: bold; }
                .fail { color: #dc3545; font-weight: bold; }
                .skip { color: #6c757d; font-weight: bold; }
                .btn { display: inline-block; padding: 10px 15px; background-color: #007bff; color: white; text-decoration: none; border-radius: 4px; margin-top: 15px; }
              </style>
            </head>
            <body>
              <h2>Playwright Test Execution Summary</h2>
              <p><strong>Status:</strong> ${{ job.status == 'success' && '🟢 Passed' || '🔴 Failed' }}</p>
              <p><strong>Branch:</strong> ${{ github.ref_name }}</p>
              <p><strong>Commit:</strong> ${{ github.event.head_commit.message }}</p>

              <table class="summary-table">
                <thead>
                  <tr>
                    <th>Metric</th>
                    <th>Count</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>✅ Passed Tests</td>
                    <td class="pass">${{ steps.parse_results.outputs.passed }} tests</td>
                  </tr>
                  <tr>
                    <td>❌ Failed Tests</td>
                    <td class="fail">${{ steps.parse_results.outputs.failed }} tests</td>
                  </tr>
                  <tr>
                    <td>⏭️  Skipped Tests</td>
                    <td class="skip">${{ steps.parse_results.outputs.skipped }} tests</td>
                  </tr>
                </tbody>
              </table>

              <p>To view the detailed history and download the full artifact reports, visit the run page:</p>
              <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" class="btn" style="color: white;">View Workflow Run</a>
            </body>
            </html>

      # ========== Deploy to GitHub Pages ==========
      - name: 🌐 Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: github-pages
          keep_files: true

      # ========== Print Report URLs ==========
      - name: 🔗 Report URLs
        if: always()
        run: |
          echo "============================================"
          echo "📊 TEST REPORTS PUBLISHED!"
          echo "============================================"
          echo ""
          echo "🏠 Main Dashboard:"
          echo "   https://rangarajan1989.github.io/Playwright-POM-Framework/"
          echo ""
          echo "📋 Playwright Report:"
          echo "   https://rangarajan1989.github.io/Playwright-POM-Framework/playwright/"
          echo ""
          echo "📊 Allure Report:"
          echo "   https://rangarajan1989.github.io/Playwright-POM-Framework/allure/"
          echo ""
          echo "============================================"
